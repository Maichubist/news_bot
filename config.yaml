filters:
  deny_title_regex:
    - '(?i)\b(sponsored|advertorial|partner(ed)? content|paid post|promotion)\b'
    - '(?i)\b(podcast|video|watch|listen)\b'
    - '(?i)\b(newsletter|subscribe|subscription)\b'
    - '(?i)\b(deals?|coupon|sale|% off|discount|promo code)\b'
    - '(?i)\b(opinion|editorial|column)\b'
  deny_url_regex:
    - '(?i)/video'
    - '(?i)/podcast'
    - '(?i)/newsletters?'
    - '(?i)/subscribe'
    - '(?i)/deals?'
    - '(?i)/coupons?'
    - '(?i)\butm_'
  deny_summary_regex:
    - '(?i)\b(sponsored|advertorial|partner(ed)? content|paid post)\b'

posting:
  max_posts_per_run: 10
  only_last_hours: 24
  include_source_name: true
  cluster_wait_minutes: 5
  breaking_sources_threshold: 3
  wrap_rules:
    - name: economy_wrap
      categories: [economy, business]
      min_items: 3
      lookback_hours: 6
      cooldown_minutes: 90
      min_sources: 2
      hashtag_slug: economy
    - name: geopolitics_wrap
      categories: [war, politics]
      min_items: 3
      lookback_hours: 6
      cooldown_minutes: 120
      min_sources: 2
      hashtag_slug: war
    - name: technology_wrap
      categories: [technology, science]
      min_items: 3
      lookback_hours: 8
      cooldown_minutes: 180
      min_sources: 2
      hashtag_slug: technology

images:
  og_fetch: true

db:
  path: "data/news.db"
  keep_days: 14

network:
  timeout_sec: 25
  verify: certifi

embeddings:
  window_hours: 24
  threshold: 0.84
  require_good_summary: false

app:
  sleep_between_posts_sec: 1.2
  log_level: INFO

monitor:
  every_seconds: 120

translate:
  enabled: false
  model: "gpt-4o-mini"
  max_chars_summary: 350