filters:
  # Глобальні фільтри, щоб реклама/форматні матеріали не потрапляли в БД
  # (regex, застосовуються до title/url/summary на етапі RSS)
  deny_title_regex:
    - '(?i)\b(sponsored|advertorial|partner(ed)? content|paid post|promotion)\b'
    - '(?i)\b(podcast|video|watch|listen)\b'
    - '(?i)\b(newsletter|subscribe|subscription)\b'
    - '(?i)\b(deals?|coupon|sale|% off|discount|promo code)\b'
    - '(?i)\b(opinion|editorial|column)\b'
  deny_url_regex:
    - '(?i)/video'
    - '(?i)/podcast'
    - '(?i)/newsletters?'
    - '(?i)/subscribe'
    - '(?i)/deals?'
    - '(?i)/coupons?'
    - '(?i)\butm_'
  deny_summary_regex:
    - '(?i)\b(sponsored|advertorial|partner(ed)? content|paid post)\b'

posting:
  max_posts_per_run: 10
  only_last_hours: 24
  include_source_name: true
  # multi-source logic
  cluster_wait_minutes: 5
  breaking_sources_threshold: 3

images:
  # Try to pull higher-quality og:image from the article page (used only for posts that will be published)
  og_fetch: true

db:
  path: "data/news.db"
  keep_days: 14

network:
  timeout_sec: 25
  verify: certifi

embeddings:
  window_hours: 24
  threshold: 0.84
  require_good_summary: false

app:
  sleep_between_posts_sec: 1.2
  log_level: INFO

monitor:
  every_seconds: 120

translate:
  enabled: false
  model: "gpt-4o-mini"
  max_chars_summary: 350
