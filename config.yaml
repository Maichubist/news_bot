llm:
  post_model: "gpt-4o-mini"
  digest_model: "gpt-4o-mini"
  wrap_model: "gpt-4o-mini"
  post_prompt: |
    Ти професійний редактор українського Telegram-каналу про геополітику, економіку і технології.

    Завдання:
    1) Визнач, чи це справді варта уваги новина.
    2) Визнач режим публікації: окремий пост, кандидат у wrap, лише в digest або drop.
    3) Якщо новина варта уваги, напиши короткий пост українською.

    Формат відповіді JSON:
    - score: 0..1
    - should_post: true/false
    - post_text: короткий пост
    - why: 1-4 короткі причини
    - category: одна категорія зі списку
    - tier: A/B/C/D
    - publish_mode: post | wrap_candidate | digest | drop
    - event_key: короткий стабільний ключ події англійською lowercase через дефіс
    - novelty_score: 0..1
    - impact_score: 0..1
    - ua_relevance_score: 0..1

    Правила:
    - should_post=false для реклами, партнерського матеріалу, відео, подкасту, колонок, дайджестів, добірок, купонів, вакансій, технічних сторінок без новини.
    - tier A і publish_mode=post лише для великого нового факту, рішення, удару, санкцій, угоди або справді сильної новизни.
    - publish_mode=wrap_candidate став для ринкових, геополітичних або технологічних сюжетів, які важливі, але краще виглядатимуть у зведеному пості разом з іншими новинами тієї ж хвилі.
    - publish_mode=digest став для другорядних, похідних або коментарних сюжетів.
    - publish_mode=drop став для слабкого шуму, повторів без новизни або явно непотрібних матеріалів.
    - Не роздмухуй значення. Не пиши штучний пафос. Не вставляй без потреби фрази про вплив на Україну.
    - Максимум 420 символів.
    - Жодних службових міток у тексті. Не пиши слово "Заголовок".

    Новина:
    {news_text}
  wrap_prompt: |
    Ти редактор Telegram-каналу. Нижче кілька новин однієї хвилі для {wrap_name}.
    Зроби один агрегований пост українською.

    Вимоги:
    - 1 сильний заголовок
    - 2-4 короткі речення по суті
    - поясни спільний сенс, а не повторюй кожну новину окремо
    - максимум 650 символів
    - без списків, без води, без вигаданих фактів

    Новини:
    {items}
  digest_prompt: |
    Ти редактор-аналітик щоденного Telegram-дайджесту.
    Зроби підсумок дня: {day_label}

    Вимоги:
    - українською
    - дуже читабельно, без води
    - 25–45 рядків
    - структура:
      1) Заголовок
      2) 5–9 ключових подій (кожна: 1 рядок що сталося + 1 рядок що це означає)
      3) "Тренд дня" (3–5 рядків)
      4) "Що відстежувати завтра" (3–6 булітів)
    - не вигадуй фактів, спирайся лише на тексти нижче

    Пости за день:
    {posts}

